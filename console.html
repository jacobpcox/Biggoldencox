<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biggoldencox | System</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06090d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="biggoldencox">
<meta property="og:type" content="website">
<meta property="og:site_name" content="biggoldencox">
<meta property="og:title" content="The BigGoldenCox Collection">
<meta property="og:description" content="A lifetime gaming collection — consoles, handhelds &amp; games with live market value.">
<meta property="og:image" content="https://biggoldencox.com/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://biggoldencox.com/og-image.png">
<style>
  :root{
    --bg:#06090d;--panel:#0b1117;--panel2:#0a0f14;--line:#13303a;
    --cy:#27d3ee;--cy-dim:#5f97a1;--amber:#ffb200;--mint:#2dd4bf;--coral:#f2777a;
    --ink:#dcf2f6;--dim:#7f9aa3;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-monospace,"Cascadia Mono","SF Mono","Consolas",monospace;line-height:1.5}
  .page{max-width:1040px;margin:0 auto;padding:24px 16px 80px}
  a{color:inherit;text-decoration:none}

  .hud{position:relative;border:1px solid var(--line);border-radius:6px;overflow:hidden;
    background:radial-gradient(120% 90% at 50% -10%, #0e1a22 0%, transparent 55%),var(--bg);
    box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(39,211,238,.05);animation:crtin 1.25s ease both}
  .hud::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(to bottom,transparent 0 3px,rgba(0,0,0,.10) 3px 4px);mix-blend-mode:multiply}
  .pwron{position:absolute;inset:0;z-index:9;background:#e7fbff;opacity:0;animation:pwr 1.05s ease forwards;pointer-events:none}
  .scan{position:absolute;left:0;right:0;height:90px;top:-90px;pointer-events:none;z-index:4;background:linear-gradient(to bottom,transparent,rgba(39,211,238,.06),transparent);animation:sweep 7s linear infinite}
  @keyframes sweep{to{transform:translateY(1500px)}}
  @keyframes pwr{0%{opacity:0;transform:scaleY(.004)}7%{opacity:.95;transform:scaleY(.004)}14%{opacity:.9;transform:scaleY(1)}34%{opacity:0;transform:scaleY(1)}100%{opacity:0}}
  @keyframes crtin{0%{opacity:.12;filter:brightness(2.6) contrast(1.5)}8%{opacity:1}10%{filter:brightness(.5)}13%{filter:brightness(1.7)}17%{filter:brightness(.85)}21%{filter:brightness(1.12)}26%{filter:none}100%{filter:none}}
  @keyframes blink2{0%,48%{opacity:1}49%,100%{opacity:0}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.75)}}
  @keyframes segpulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes cardsweep{0%{transform:translateY(-120%)}100%{transform:translateY(440%)}}
  .blink{animation:blink2 1s steps(1) infinite}

  .brk{position:relative}
  .brk::before{content:"";position:absolute;top:6px;left:6px;right:6px;bottom:6px;pointer-events:none;opacity:.55;z-index:1;transition:opacity .2s;
    background:
      linear-gradient(var(--cy),var(--cy)) top left/13px 2px no-repeat,
      linear-gradient(var(--cy),var(--cy)) top left/2px 13px no-repeat,
      linear-gradient(var(--cy),var(--cy)) top right/13px 2px no-repeat,
      linear-gradient(var(--cy),var(--cy)) top right/2px 13px no-repeat,
      linear-gradient(var(--cy),var(--cy)) bottom left/13px 2px no-repeat,
      linear-gradient(var(--cy),var(--cy)) bottom left/2px 13px no-repeat,
      linear-gradient(var(--cy),var(--cy)) bottom right/13px 2px no-repeat,
      linear-gradient(var(--cy),var(--cy)) bottom right/2px 13px no-repeat}

  .bar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--line);position:relative;z-index:2;flex-wrap:wrap;gap:8px}
  .bar .brand{font-size:13px;letter-spacing:.16em;color:var(--cy-dim)} .bar .brand b{color:var(--cy);text-shadow:0 0 12px rgba(39,211,238,.45)}
  .bar .back{font-size:11px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;border:1px solid var(--line);padding:7px 13px;border-radius:3px;transition:all .15s}
  .bar .back:hover{color:var(--cy);border-color:var(--cy);box-shadow:0 0 12px rgba(39,211,238,.25)}
  .bootstrip{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;color:#5fb9c7;padding:7px 18px;border-bottom:1px solid var(--line);position:relative;z-index:2;min-height:30px}
  .bootstrip #boottext{color:var(--cy)}

  .hero{display:grid;grid-template-columns:minmax(0,360px) 1fr;gap:22px;padding:22px 18px;border-bottom:1px solid var(--line);position:relative;z-index:2;align-items:center}
  @media(max-width:680px){.hero{grid-template-columns:1fr}}
  .himg{aspect-ratio:16/10;border:1px solid var(--line);background:radial-gradient(circle at 50% 40%,#11202a,#080d12);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .himg img{width:100%;height:100%;object-fit:contain;padding:10px}
  .eyebrow{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--cy-dim);margin-bottom:7px}
  .htitle{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:clamp(26px,4vw,40px);line-height:1;font-weight:700;color:#eafcff;text-shadow:0 0 26px rgba(39,211,238,.22);margin:0 0 12px}
  .meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border:1px solid var(--line);background:rgba(0,0,0,.25);padding:5px 10px;border-radius:3px}
  .tag.rel{color:var(--cy);border-color:#16414c}.tag.price{color:var(--amber);border-color:#5a4410}.tag.val{color:var(--mint);border-color:#1d5249}
  .desc{font-size:13px;color:#b6cdd3;line-height:1.6}

  .status{display:grid;grid-template-columns:1.2fr 1.4fr;gap:18px;padding:20px 18px;border-bottom:1px solid var(--line);position:relative;z-index:2;align-items:center}
  @media(max-width:680px){.status{grid-template-columns:1fr}}
  .scap{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cy-dim);margin-bottom:5px}
  .sval{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:42px;line-height:.9;font-weight:700;color:#eafcff;font-variant-numeric:tabular-nums}
  .sgain{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:11px;color:var(--mint);border:1px solid #1d5249;background:#0c2a26;padding:4px 9px;border-radius:4px}
  .bigmeter{display:flex;gap:3px;margin-top:12px}
  .bigmeter i{height:14px;flex:1;background:#0e2026;border:1px solid #16323b;transition:background .3s,box-shadow .3s,border-color .3s}
  .bigmeter i.on{background:linear-gradient(#27d3ee,#1aa7bd);border-color:#27d3ee;box-shadow:0 0 7px rgba(39,211,238,.5)}
  .bigmeter i.on:last-of-type{animation:segpulse 1.1s ease-in-out infinite}
  .meterkey{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:6px;letter-spacing:.08em}
  .sstats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
  @media(max-width:430px){.sstats{grid-template-columns:1fr 1fr}}
  .sstats div{background:var(--panel);padding:11px 12px;text-align:center}
  .sstats .n{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:19px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .sstats .n.cy{color:var(--cy)}.sstats .n.am{color:var(--amber)}.sstats .n.mt{color:var(--mint)}
  .sstats .l{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:3px}

  .seclabel{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--cy-dim);padding:16px 18px 0;position:relative;z-index:2}
  .seclabel span{color:var(--dim)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:10px 18px 18px;position:relative;z-index:2}
  @media(max-width:680px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:430px){.grid{grid-template-columns:1fr}}
  /* game cards are informational, not links — no clickable hover cues */
  .card{background:linear-gradient(#0b1218,#080d12);border:1px solid var(--line);padding:12px;overflow:hidden;display:block;position:relative}
  .gimg{height:104px;background:radial-gradient(circle at 50% 42%,#11202a,#080d12);border:1px solid #102832;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:10px}
  .gimg img{width:100%;height:100%;object-fit:contain;padding:7px}
  .ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--dim);text-align:center;padding:8px}
  .ph .ic{font-size:30px;opacity:.7}.ph .nm{font-size:10px;letter-spacing:.05em}
  .cn{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:14px;font-weight:700;color:var(--ink);margin:0 0 4px;line-height:1.1}
  .players{font-size:10px;color:var(--dim);margin-bottom:8px;letter-spacing:.03em}
  .rate{display:flex;align-items:center;gap:7px;margin-bottom:8px}
  .rseg{display:flex;gap:2px}.rseg i{width:13px;height:6px;background:#1a2a30;transition:background .25s}.rseg i.on{background:var(--amber);box-shadow:0 0 6px rgba(255,178,0,.4)}
  .rnum{font-size:10px;color:var(--amber);font-variant-numeric:tabular-nums}.rnum.na{color:var(--dim)}
  .cval{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:11px;color:var(--dim);border-top:1px solid #102229;padding-top:7px}
  .cval .pr{color:var(--amber)}.cval .vl{color:var(--mint);font-weight:700}
  .badges{position:absolute;top:9px;left:9px;right:9px;display:flex;justify-content:space-between;z-index:2;pointer-events:none}
  .bdg{font-size:8px;font-weight:700;letter-spacing:.06em;padding:2px 6px;border:1px solid var(--line);background:rgba(0,0,0,.6);color:var(--cy-dim)}
  .bdg.man{color:var(--cy)}.bdg.cib{color:var(--amber);border-color:#5a4410}

  .empty{padding:46px 18px;text-align:center;color:var(--dim);position:relative;z-index:2}
  .empty .big{font-size:40px;margin-bottom:10px}

  .tabbar{display:flex;gap:8px;padding:16px 18px 0;position:relative;z-index:2;flex-wrap:wrap}
  .tab{font:inherit;background:none;border:1px solid var(--line);cursor:pointer;color:var(--dim);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:3px;transition:all .15s}
  .tabbar .tab:hover:not(.a){color:var(--cy);border-color:var(--cy)}
  .tabbar .tab.a{color:#06121a;background:var(--cy);border-color:var(--cy);font-weight:700;box-shadow:0 0 12px rgba(39,211,238,.35)}
  .view[hidden]{display:none}

  .acc{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 18px 18px;position:relative;z-index:2}
  @media(max-width:680px){.acc{grid-template-columns:1fr 1fr}}@media(max-width:430px){.acc{grid-template-columns:1fr}}
  .acard{display:flex;align-items:center;gap:11px;border:1px solid var(--line);background:var(--panel2);padding:10px 12px}
  .aimg{width:48px;height:48px;flex:none;border:1px solid #102832;background:radial-gradient(circle at 50% 40%,#11202a,#080d12);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
  .aimg img{width:100%;height:100%;object-fit:contain;padding:3px}
  .an{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:13px;font-weight:700;color:var(--ink)}.an .q{color:var(--dim);font-size:11px;margin-left:5px}
  .ap{font-size:10px;color:var(--amber);margin-top:3px}

  .gwish{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px 18px 18px;position:relative;z-index:2}
  @media(max-width:680px){.gwish{grid-template-columns:1fr 1fr}}
  .gw{border:1px dashed var(--line);border-left:3px solid var(--cy);padding:10px 12px;font-size:12.5px;color:var(--ink);background:rgba(255,255,255,.015)}

  .notfound{padding:90px 20px;text-align:center;position:relative;z-index:2}
  .notfound h1{font-family:"Bahnschrift",sans-serif;color:var(--cy)}.notfound a{color:var(--cy);border-bottom:1px solid var(--cy)}
  .foot{text-align:center;color:var(--dim);font-size:12px;margin-top:24px;letter-spacing:.06em}.foot span{color:var(--coral)}
  .previewtag{position:fixed;bottom:12px;left:12px;z-index:50;background:#0c2a26;border:1px solid #1d5249;color:var(--mint);font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.1em;padding:6px 11px;border-radius:4px}

  @media (prefers-reduced-motion:reduce){
    .hud,.scan,.pwron,.blink,.bigmeter i.on:last-of-type{animation:none}.pwron{display:none}
    .card:hover::after{animation:none;opacity:0}
  }
</style>
</head>
<body>
<div class="page"><div class="hud" id="hud">
  <div class="pwron"></div>
  <div class="scan"></div>
  <div id="app"></div>
</div></div>

<script src="data.js"></script>
<script>
  var rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function getSlug(){ var h=(window.location.hash||"").replace(/^#/,""); if(h)return decodeURIComponent(h); return new URLSearchParams(window.location.search).get("c"); }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function money(n){ return "$"+Number(n).toLocaleString(undefined,{maximumFractionDigits:2}); }
  function hasManual(slug,g){ return g.manual||(typeof MANUALS!=="undefined"&&(MANUALS[slug]===true||(Array.isArray(MANUALS[slug])&&MANUALS[slug].includes(g.title)))); }
  function isCIB(slug,g){ return g.cib||(typeof CIB!=="undefined"&&(CIB[slug]===true||(Array.isArray(CIB[slug])&&CIB[slug].includes(g.title)))); }

  function rateHTML(rating){
    if(typeof rating!=="number"||isNaN(rating)) return '<div class="rate"><div class="rseg"><i></i><i></i><i></i><i></i><i></i></div><span class="rnum na">UNRATED</span></div>';
    var r=Math.max(0,Math.min(5,rating)), on=Math.round(r), s="";
    for(var i=0;i<5;i++){ s+='<i class="'+(i<on?'on':'')+'"></i>'; }
    return '<div class="rate"><div class="rseg">'+s+'</div><span class="rnum">'+r.toFixed(1)+'</span></div>';
  }
  function priceVal(g,slug){
    var pr = g.price===0?'free':(typeof g.price==="number"?'$'+g.price.toLocaleString():'');
    var V=window.VALUES; var v=(V&&V.games&&V.games[slug])?V.games[slug][g.title]:undefined;
    var vl = typeof v==="number"?money(v):'';
    return '<div class="cval"><span class="pr">'+(pr?'paid '+pr:'')+'</span><span class="vl">'+(vl||'')+'</span></div>';
  }
  function gameCard(g,icon,slug){
    var imgSrc=g.img||(window.IMAGES&&IMAGES.games&&IMAGES.games[slug]&&IMAGES.games[slug][g.title]);
    var ph='<div class="ph"><div class="ic">'+(icon||"🎮")+'</div><div class="nm">'+esc(g.title)+'</div></div>';
    var img=imgSrc?'<img src="'+imgSrc+'" alt="'+esc(g.title)+'" loading="lazy" onerror="this.parentNode.innerHTML=this.parentNode.dataset.ph;">':ph;
    var man=hasManual(slug,g)?'<span class="bdg man">📖 MAN</span>':'<span></span>';
    var cib=isCIB(slug,g)?'<span class="bdg cib">📦 CIB</span>':'<span></span>';
    var p=g.players||(typeof PLAYERS!=="undefined"&&PLAYERS[slug]&&PLAYERS[slug][g.title]);
    var players=p?'<div class="players">👥 '+esc(String(p))+' player'+(String(p)==="1"?"":"s")+'</div>':'<div class="players" style="opacity:.4">—</div>';
    return '<div class="card brk">'
      +'<div class="badges">'+man+cib+'</div>'
      +'<div class="gimg" data-ph="'+ph.replace(/"/g,'&quot;')+'">'+img+'</div>'
      +'<h3 class="cn">'+esc(g.title)+'</h3>'+players+rateHTML(g.rating)+priceVal(g,slug)
      +'</div>';
  }

  function render(){
    var app=document.getElementById("app");
    var slug=getSlug(); var c=slug?findConsole(slug):null;
    if(!c){ app.innerHTML='<div class="notfound"><h1>SYSTEM NOT FOUND</h1><p><a href="index.html">&larr; Back to the Vault</a></p></div>'; return; }
    document.title="biggoldencox | "+c.name;
    var released=RELEASE_YEAR[c.name];
    var typeLabel={handheld:"Handheld",arcade:"Arcade",console:"Console"}[c.type]||"Console";
    var games=GAMES[slug]||[], accessories=ACCESSORIES[slug]||[], wishlist=(typeof GAME_WISHLIST!=="undefined"&&GAME_WISHLIST[slug])||[];
    var V=window.VALUES;

    var meta=['<span class="tag">'+typeLabel+'</span>'];
    if(released) meta.push('<span class="tag rel">Released '+released+'</span>');
    if(c.year) meta.push('<span class="tag">Acquired '+c.year+'</span>');
    var price=(c.price===0)?"Free":(c.price?'$'+c.price.toLocaleString():null);
    if(price) meta.push('<span class="tag price">'+price+'</span>');
    if(c.qty&&c.qty>1) meta.push('<span class="tag">×'+c.qty+' owned</span>');

    var ph='<div class="ph"><div class="ic">'+c.icon+'</div><div class="nm">'+esc(c.name)+'</div></div>';
    var heroImg=c.img?'<img src="'+c.img+'" alt="'+esc(c.name)+'" onerror="this.parentNode.innerHTML=this.parentNode.dataset.ph;">':ph;

    var gameSpend=games.reduce(function(s,g){return s+(typeof g.price==="number"?g.price:0);},0);
    var accSpend=accessories.reduce(function(s,a){return s+(typeof a.price==="number"?a.price:0);},0);
    var rated=games.filter(function(g){return typeof g.rating==="number";});
    var avg=rated.length?(rated.reduce(function(s,g){return s+g.rating;},0)/rated.length):null;
    var hardware=(typeof c.price==="number"?c.price:0);
    var systemTotal=hardware+gameSpend+accSpend;

    var curVal=0;
    if(V){
      var cv=((V.consoles&&V.consoles[slug])||0)*(c.qty||1);
      var gv=(V.games&&V.games[slug])?Object.values(V.games[slug]).reduce(function(s,x){return s+(x||0);},0):0;
      var av=accessories.reduce(function(s,a){var ex=V.accessories&&V.accessories[slug]&&V.accessories[slug][a.name];return s+(typeof ex==="number"?ex:(typeof a.price==="number"?a.price:0));},0);
      var mvRate=(typeof MANUAL_VALUE!=="undefined"&&MANUAL_VALUE[slug])||0;
      var mv=mvRate?games.reduce(function(s,g){return s+(hasManual(slug,g)?mvRate:0);},0):0;
      curVal=cv+gv+av+mv;
    }
    var paidBase=systemTotal;
    var pct=paidBase>0?(curVal-paidBase)/paidBase*100:null;
    var up=curVal>=paidBase;

    // hero
    var heroHTML='<div class="hero">'
      +'<div class="himg" data-ph="'+ph.replace(/"/g,'&quot;')+'">'+heroImg+'</div>'
      +'<div><div class="eyebrow">'+typeLabel+' in the collection</div><h1 class="htitle">'+esc(c.name)+'</h1>'
      +'<div class="meta">'+meta.join("")+'</div><p class="desc">'+esc(c.desc||"")+'</p></div></div>';

    // status strip (only if we have value data or games)
    var statusHTML="";
    if(curVal>0 || games.length){
      var segOn=Math.max(1,Math.min(12,Math.round(curVal/((paidBase*1.25)||curVal||1)*12)));
      var segs=""; for(var i=0;i<12;i++){ segs+='<i class="'+(i<segOn?'on':'')+'"></i>'; }
      var gainHTML = pct!==null
        ? '<div class="sgain" id="sgain">'+(pct>=0?'▲ ':'▼ ')+Math.abs(pct).toFixed(1)+'% '+(pct>=0?'over':'under')+' '+money(paidBase)+'</div>'
        : '';
      statusHTML='<div class="status">'
        +'<div><div class="scap">System value · <span class="blink" style="color:var(--mint)">● LIVE</span></div>'
        +'<div class="sval" id="sval" data-target="'+Math.round(curVal)+'">$0</div>'+gainHTML
        +'<div class="bigmeter" id="bigmeter">'+segs+'</div>'
        +'<div class="meterkey"><span>VALUE LOAD</span><span>'+money(curVal)+' / '+money(Math.round((paidBase*1.25)||curVal))+'</span></div></div>'
        +'<div class="sstats">'
        +'<div><div class="n cy" data-c="'+games.length+'">0</div><div class="l">Games</div></div>'
        +'<div><div class="n am">'+(avg!=null?avg.toFixed(1)+'★':'—')+'</div><div class="l">Avg rating</div></div>'
        +'<div><div class="n">'+money(gameSpend)+'</div><div class="l">Spent on games</div></div>'
        +'<div><div class="n mt">'+money(systemTotal)+'</div><div class="l">System total</div></div>'
        +'</div></div>';
    }

    // library (games)
    var libBody;
    if(games.length){
      libBody='<div class="grid" id="grid">'+games.map(function(g){return gameCard(g,c.icon,slug);}).join("")+'</div>';
    } else {
      libBody='<div class="empty"><div class="big">'+c.icon+'</div><div>Games coming soon — library still being added.</div></div>';
    }

    // accessories
    var accBody="";
    if(accessories.length){
      var rows=accessories.map(function(a){
        var aph='<div style="font-size:20px">🎛️</div>';
        var img=a.img?'<img src="'+a.img+'" alt="'+esc(a.name)+'" loading="lazy" onerror="this.parentNode.innerHTML=\'🎛️\';">':aph;
        var pr=(a.price===0)?"Free":(typeof a.price==="number"?'$'+a.price.toLocaleString():"");
        var q=(a.qty&&a.qty>1)?'<span class="q">×'+a.qty+'</span>':"";
        return '<div class="acard"><div class="aimg">'+img+'</div><div><div class="an">'+esc(a.name)+q+'</div>'+(pr?'<div class="ap">'+pr+'</div>':"")+'</div></div>';
      }).join("");
      accBody='<div class="acc">'+rows+'</div>';
    }

    // games wishlist
    var wishBody="";
    if(wishlist.length){
      wishBody='<div class="gwish">'+wishlist.map(function(t){return '<div class="gw">'+esc(t)+'</div>';}).join("")+'</div>';
    }

    // tabs: Library always; Accessories / Hunting only when populated
    var tabs=[{id:'lib',label:'Library · '+games.length}];
    if(accessories.length) tabs.push({id:'acc',label:'Accessories · '+accessories.length});
    if(wishlist.length) tabs.push({id:'hunt',label:'Hunting · '+wishlist.length});
    var hasTabs=tabs.length>1;
    var tabbar=hasTabs?'<div class="tabbar">'+tabs.map(function(t,i){return '<button class="tab'+(i===0?' a':'')+'" data-tab="'+t.id+'">'+t.label+'</button>';}).join("")+'</div>':'';
    var libLabel=hasTabs?'':'<div class="seclabel">// Library · <span>'+games.length+' titles</span></div>';
    var content='<div class="view" id="view-lib">'+libLabel+libBody+'</div>'
      +(accessories.length?'<div class="view" id="view-acc"'+(hasTabs?' hidden':'')+'>'+accBody+'</div>':'')
      +(wishlist.length?'<div class="view" id="view-hunt"'+(hasTabs?' hidden':'')+'>'+wishBody+'</div>':'');

    app.innerHTML='<div class="bar"><div class="brand">&gt; <b>BIGGOLDENCOX</b> // SYSTEM</div><a class="back" href="index.html">◂ Vault</a></div>'
      +'<div class="bootstrip">&gt; <span id="boottext">SYSTEM LINKED</span></div>'
      +heroHTML+statusHTML+tabbar+content
      +'<div class="foot">Gaming across all platforms <span>&hearts;</span> since 1996</div>';

    document.querySelectorAll('.tabbar .tab').forEach(function(t){ t.addEventListener('click',function(){
      var name=t.dataset.tab;
      document.querySelectorAll('.view').forEach(function(v){ v.hidden = (v.id!=='view-'+name); });
      document.querySelectorAll('.tabbar .tab').forEach(function(x){ x.classList.toggle('a', x===t); });
    }); });

    window.scrollTo(0,0);
    animate(slug);
  }

  function countUp(el,target,pre){ var dur=900,st=performance.now(); (function tick(now){var p=Math.min(1,(now-st)/dur);var e=0.5-Math.cos(p*Math.PI)/2;el.textContent=pre+Math.round(target*e).toLocaleString();if(p<1)requestAnimationFrame(tick);})(performance.now()); }
  function animate(slug){
    // boot line
    var bt=document.getElementById("boottext");
    if(bt){
      if(rm){ bt.textContent="SYSTEM LINKED · READY"; }
      else { var full="LOADING SYSTEM… ROM VERIFIED · LIBRARY SYNCED · READY"; bt.textContent=""; var i=0;(function type(){if(i<=full.length){bt.textContent=full.slice(0,i++);setTimeout(type,24);}})(); }
    }
    var sval=document.getElementById("sval");
    if(sval){ var t=+sval.dataset.target; if(rm)sval.textContent="$"+t.toLocaleString(); else countUp(sval,t,"$"); }
    document.querySelectorAll('[data-c]').forEach(function(e){ var t=+e.dataset.c; if(rm)e.textContent=t.toLocaleString(); else countUp(e,t,""); });
    // charge big meter
    var bm=document.getElementById("bigmeter");
    if(bm&&!rm){ var lit=[]; bm.querySelectorAll('i.on').forEach(function(x){lit.push(x);x.classList.remove('on');}); lit.forEach(function(x,i){setTimeout(function(){x.classList.add('on');},900+i*70);}); }
    // charge rating bars
    if(!rm){ document.querySelectorAll('.grid .rseg').forEach(function(seg,ci){ var lit=[]; seg.querySelectorAll('i.on').forEach(function(x){lit.push(x);x.classList.remove('on');}); lit.forEach(function(x,i){setTimeout(function(){x.classList.add('on');},1100+ci*45+i*60);}); }); }
  }

  var loadJSON=function(f){ return fetch(f,{cache:"no-store"}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}); };
  Promise.all([loadJSON("values.json"),loadJSON("images.json")]).then(function(a){ window.VALUES=a[0]; window.IMAGES=a[1]; }).finally(render);
  window.addEventListener("hashchange",render);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
</script>
</body>
</html>
