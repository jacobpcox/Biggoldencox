<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>biggoldencox | Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --xbox-green: #107C10;
            --playstation-blue: #003791;
            --steam-dark: #1b2838;
            --steam-blue: #66c0f4;
            --nintendo-red: #E60012;
            --discord-blurple: #5865F2;
            --discord-dark: #23272A;
            --gold-accent: #FFD700;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--discord-dark) 0%, var(--steam-dark) 50%, #0d1117 100%);
            background-attachment: fixed;
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 20px 80px;
        }

        /* Back nav */
        .top-nav { margin-bottom: 26px; }
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: color 0.3s, border-color 0.3s, transform 0.3s;
        }
        .nav-link:hover { color: var(--gold-accent); border-color: var(--gold-accent); transform: translateX(-3px); }

        /* Hero */
        .hero {
            display: grid;
            grid-template-columns: minmax(0, 420px) 1fr;
            gap: 30px;
            align-items: center;
            background: linear-gradient(145deg, rgba(35, 39, 42, 0.92), rgba(27, 40, 56, 0.92));
            border-radius: 24px;
            padding: 26px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            margin-bottom: 50px;
        }
        .hero::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent, var(--gold-accent)), transparent);
        }
        .hero-image {
            aspect-ratio: 16 / 10;
            border-radius: 16px;
            background: radial-gradient(circle at 50% 42%, #6b7686 0%, #3a4250 45%, #20262e 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .hero-image img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }

        .hero-eyebrow {
            font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.55); margin-bottom: 8px;
        }
        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 900; line-height: 1.1; margin-bottom: 16px;
            color: var(--accent, var(--gold-accent));
        }
        .hero-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .tag {
            font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12); background: rgba(0, 0, 0, 0.25);
            color: rgba(255, 255, 255, 0.78);
        }
        .tag.release { color: var(--gold-accent); border-color: rgba(255, 215, 0, 0.35); }
        .tag.price { color: var(--gold-accent); border-color: rgba(255, 215, 0, 0.35); }
        .tag.value { color: #2ECC71; border-color: rgba(46, 204, 113, 0.4); }
        .meta-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .hero-desc { font-size: 16px; line-height: 1.6; color: rgba(255, 255, 255, 0.82); }

        @media (max-width: 760px) {
            .hero { grid-template-columns: 1fr; }
        }

        /* Games section */
        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem; font-weight: 700; margin-bottom: 6px;
        }
        .section-sub { color: rgba(255, 255, 255, 0.55); margin-bottom: 22px; font-size: 15px; }

        .stats-bar { display: flex; flex-wrap: wrap; gap: 14px; margin: 0 0 30px; }
        .stat-pill {
            flex: 1 1 150px; text-align: center; padding: 16px 18px;
            background: linear-gradient(145deg, rgba(35, 39, 42, 0.9), rgba(27, 40, 56, 0.9));
            border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .stat-pill .num { font-family: 'Orbitron', monospace; font-size: clamp(1.4rem, 3.5vw, 2rem); font-weight: 700; line-height: 1; }
        .stat-pill .lbl { margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); }
        .stat-pill:nth-child(1) .num { color: var(--steam-blue); }
        .stat-pill:nth-child(2) .num { color: var(--gold-accent); }
        .stat-pill:nth-child(3) .num { color: var(--nintendo-red); }
        .stat-pill:nth-child(4) .num { color: var(--xbox-green); }
        .stat-pill:nth-child(5) .num { color: #2ECC71; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .card {
            background: linear-gradient(145deg, rgba(35, 39, 42, 0.92), rgba(27, 40, 56, 0.92));
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex; flex-direction: column;
            transition: transform 0.35s, box-shadow 0.35s, border-color 0.35s;
            position: relative;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent, var(--gold-accent)), transparent); z-index: 2;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: var(--accent, var(--gold-accent));
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--accent, var(--gold-accent));
        }
        .card-image {
            position: relative; aspect-ratio: 16 / 10;
            background: radial-gradient(circle at 50% 42%, #6b7686 0%, #3a4250 45%, #20262e 100%);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .card-image img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
        .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px; text-align: center; }
        .placeholder .icon { font-size: 40px; opacity: 0.85; }
        .placeholder .ph-name { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: rgba(255, 255, 255, 0.55); }
        .placeholder .ph-note { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.3); }
        .year-badge {
            position: absolute; top: 12px; right: 12px;
            background: linear-gradient(135deg, var(--gold-accent), #FFA500); color: #000;
            font-family: 'Orbitron', monospace; font-weight: 700; font-size: 13px;
            padding: 6px 14px; border-radius: 20px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4); z-index: 1;
        }
        .card-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
        .card-name { font-family: 'Orbitron', monospace; font-size: 17px; font-weight: 700; line-height: 1.2; margin-bottom: 14px; }
        .game-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: auto; }

        .stars { position: relative; display: inline-block; font-size: 20px; line-height: 1; letter-spacing: 2px; white-space: nowrap; }
        .stars-empty { color: rgba(255, 255, 255, 0.2); }
        .stars-fill { position: absolute; top: 0; left: 0; width: var(--pct, 0%); overflow: hidden; color: var(--gold-accent); }
        .stars-na { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.35); }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 70px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
        }
        .empty-state .big { font-size: 46px; margin-bottom: 14px; }
        .empty-state .msg { font-size: 18px; color: rgba(255, 255, 255, 0.65); }
        .empty-state .sub { font-size: 14px; color: rgba(255, 255, 255, 0.4); margin-top: 8px; }

        .not-found { text-align: center; padding: 100px 20px; }
        .not-found h1 { font-family: 'Orbitron', monospace; margin-bottom: 14px; }
        .not-found a { color: var(--gold-accent); }

        .footer { margin-top: 60px; text-align: center; font-size: 13px; color: rgba(255, 255, 255, 0.4); }
        .footer span { color: var(--nintendo-red); }

        @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script src="data.js"></script>
    <script>
        function getSlug() {
            // Prefer the hash (survives static-host clean-URL redirects); fall back to ?c= for old links.
            const h = (window.location.hash || "").replace(/^#/, "");
            if (h) return decodeURIComponent(h);
            return new URLSearchParams(window.location.search).get("c");
        }
        function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function money(n) { return "$" + Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }); }

        function starsHTML(rating) {
            if (typeof rating !== "number" || isNaN(rating)) {
                return `<div class="stars-na">Unrated</div>`;
            }
            const r = Math.max(0, Math.min(5, rating));
            const pct = (r / 5) * 100;
            return `<div class="stars" title="${r} / 5" style="--pct:${pct}%">
                        <span class="stars-empty">★★★★★</span>
                        <span class="stars-fill">★★★★★</span>
                    </div>`;
        }

        function priceTag(price) {
            if (price === 0) return `<span class="tag price">Gift / Free</span>`;
            if (typeof price === "number") return `<span class="tag price">$${price.toLocaleString()}</span>`;
            return "";
        }

        function valueTag(slug, title) {
            const V = window.VALUES;
            const v = (V && V.games && V.games[slug]) ? V.games[slug][title] : undefined;
            if (typeof v !== "number") return "";
            return `<span class="tag value">Value $${v.toLocaleString(undefined, { maximumFractionDigits: 2 })}</span>`;
        }

        function gameCardHTML(g, accent, fallbackIcon, slug) {
            const placeholder = `
                <div class="placeholder">
                    <div class="icon">${fallbackIcon || "🎮"}</div>
                    <div class="ph-name">${esc(g.title)}</div>
                    <div class="ph-note">Photo coming soon</div>
                </div>`;
            const imgSrc = g.img || (window.IMAGES && IMAGES.games && IMAGES.games[slug] && IMAGES.games[slug][g.title]);
            const img = imgSrc
                ? `<img src="${imgSrc}" alt="${esc(g.title)}" loading="lazy"
                        onerror="this.parentNode.innerHTML = this.parentNode.dataset.placeholder;">`
                : placeholder;
            return `
                <div class="card" style="--accent:${accent};">
                    <div class="card-image" data-placeholder="${placeholder.replace(/"/g, '&quot;')}">
                        ${img}
                    </div>
                    <div class="card-body">
                        <h3 class="card-name">${esc(g.title)}</h3>
                        <div class="game-meta">
                            ${starsHTML(g.rating)}
                            <span class="meta-right">${priceTag(g.price)}${valueTag(slug, g.title)}</span>
                        </div>
                    </div>
                </div>`;
        }

        function render() {
            const app = document.getElementById("app");
            const slug = getSlug();
            const c = slug ? findConsole(slug) : null;

            if (!c) {
                app.innerHTML = `
                    <div class="not-found">
                        <h1>Console not found</h1>
                        <p><a href="index.html">&larr; Back to the Console Vault</a></p>
                    </div>`;
                return;
            }

            document.title = `biggoldencox | ${c.name}`;
            const released = RELEASE_YEAR[c.name];
            const typeLabel = { handheld: "Handheld", arcade: "Arcade", console: "Console" }[c.type] || "Console";

            // hero meta tags
            const meta = [`<span class="tag">${typeLabel}</span>`];
            if (released) meta.push(`<span class="tag release">Released ${released}</span>`);
            if (c.year) meta.push(`<span class="tag">Acquired ${c.year}</span>`);
            const price = (c.price === 0) ? "Gift / Free" : (c.price ? "$" + c.price.toLocaleString() : null);
            if (price) meta.push(`<span class="tag price">${price}</span>`);
            if (c.qty && c.qty > 1) meta.push(`<span class="tag">×${c.qty} owned</span>`);

            const heroPlaceholder = `<div class="placeholder"><div class="icon">${c.icon}</div><div class="ph-name">${esc(c.name)}</div></div>`;
            const heroImg = c.img
                ? `<img src="${c.img}" alt="${esc(c.name)}" onerror="this.parentNode.innerHTML = this.parentNode.dataset.placeholder;">`
                : heroPlaceholder;

            const games = (GAMES[slug] || []);

            // --- Game stats for this console ---
            let statsBlock = "";
            if (games.length) {
                const gameSpend = games.reduce((s, g) => s + (typeof g.price === "number" ? g.price : 0), 0);
                const rated = games.filter(g => typeof g.rating === "number");
                const avgRating = rated.length ? (rated.reduce((s, g) => s + g.rating, 0) / rated.length) : null;
                const hardware = (typeof c.price === "number" ? c.price : 0);

                // Current market value for this system (from values.json, if populated).
                const V = window.VALUES;
                let valuePill = "";
                if (V) {
                    const cv = (V.consoles && V.consoles[slug]) || 0;
                    const gv = (V.games && V.games[slug]) ? Object.values(V.games[slug]).reduce((s, x) => s + (x || 0), 0) : 0;
                    if (cv || gv) valuePill = `<div class="stat-pill"><div class="num">${money(cv + gv)}</div><div class="lbl">Current Value</div></div>`;
                }

                statsBlock = `
                    <div class="stats-bar">
                        <div class="stat-pill"><div class="num">${games.length}</div><div class="lbl">Games</div></div>
                        <div class="stat-pill"><div class="num">${avgRating != null ? avgRating.toFixed(1) + "★" : "—"}</div><div class="lbl">Avg Rating</div></div>
                        <div class="stat-pill"><div class="num">${money(gameSpend)}</div><div class="lbl">Spent on Games</div></div>
                        <div class="stat-pill"><div class="num">${money(hardware + gameSpend)}</div><div class="lbl">System Total</div></div>
                        ${valuePill}
                    </div>`;
            }

            let gamesBlock;
            if (games.length) {
                gamesBlock = `<div class="grid">${games.map(g => gameCardHTML(g, c.accent, c.icon, slug)).join("")}</div>`;
            } else {
                gamesBlock = `
                    <div class="empty-state">
                        <div class="big">${c.icon}</div>
                        <div class="msg">Games coming soon</div>
                        <div class="sub">The library for this system is still being added.</div>
                    </div>`;
            }

            app.innerHTML = `
                <nav class="top-nav"><a class="nav-link" href="index.html">&larr; Console Vault</a></nav>

                <section class="hero" style="--accent:${c.accent};">
                    <div class="hero-image" data-placeholder="${heroPlaceholder.replace(/"/g, '&quot;')}">${heroImg}</div>
                    <div class="hero-info">
                        <div class="hero-eyebrow">${typeLabel} in the collection</div>
                        <h1 class="hero-title">${esc(c.name)}</h1>
                        <div class="hero-meta">${meta.join("")}</div>
                        <p class="hero-desc">${esc(c.desc)}</p>
                    </div>
                </section>

                <h2 class="section-title">Games</h2>
                <p class="section-sub">The games biggoldencox has played on the ${esc(c.name)}.</p>
                ${statsBlock}
                ${gamesBlock}

                <div class="footer">Gaming across all platforms <span>&hearts;</span> since 1996</div>`;

            window.scrollTo(0, 0);
        }

        // Load current-value + cover-art data (if present) before rendering; harmless if absent.
        const loadJSON = (f) => fetch(f, { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null);
        Promise.all([loadJSON("values.json"), loadJSON("images.json")])
            .then(([v, i]) => { window.VALUES = v; window.IMAGES = i; })
            .finally(render);
        window.addEventListener("hashchange", render);
    </script>
</body>
</html>
