<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>biggoldencox | Gaming Legacy Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --xbox-green: #107C10;
            --playstation-blue: #003791;
            --steam-dark: #1b2838;
            --steam-blue: #66c0f4;
            --nintendo-red: #E60012;
            --discord-blurple: #5865F2;
            --discord-dark: #23272A;
            --gold-accent: #FFD700;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--discord-dark) 0%, var(--steam-dark) 50%, #0d1117 100%);
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            opacity: 0.6;
            animation: float 15s infinite ease-in-out;
        }

        /* PlayStation shapes */
        .shape-triangle {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 26px solid var(--playstation-blue);
        }

        .shape-circle {
            width: 25px;
            height: 25px;
            border: 4px solid var(--nintendo-red);
            border-radius: 50%;
        }

        .shape-square {
            width: 20px;
            height: 20px;
            border: 4px solid #ff69b4;
        }

        .shape-x {
            font-size: 24px;
            color: var(--steam-blue);
            font-weight: bold;
        }

        .shape-xbox {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: var(--xbox-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .shape-discord {
            width: 20px;
            height: 15px;
            background: var(--discord-blurple);
            border-radius: 5px 5px 10px 10px;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Platform icons bar */
        .platform-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .platform-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: default;
        }

        .platform-icon:hover {
            transform: scale(1.2);
        }

        .platform-xbox {
            background: var(--xbox-green);
            box-shadow: 0 0 20px rgba(16, 124, 16, 0.5);
        }

        .platform-playstation {
            background: var(--playstation-blue);
            box-shadow: 0 0 20px rgba(0, 55, 145, 0.5);
        }

        .platform-steam {
            background: linear-gradient(135deg, #1b2838, var(--steam-blue));
            box-shadow: 0 0 20px rgba(102, 192, 244, 0.3);
        }

        .platform-nintendo {
            background: var(--nintendo-red);
            box-shadow: 0 0 20px rgba(230, 0, 18, 0.5);
        }

        .platform-discord {
            background: var(--discord-blurple);
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
        }

        /* Gamertag display */
        .gamertag-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .gamertag-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .gamertag {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(
                90deg,
                var(--xbox-green),
                var(--steam-blue),
                var(--discord-blurple),
                var(--nintendo-red),
                var(--gold-accent)
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 8s ease infinite;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.2));
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Timer card */
        .timer-card {
            background: linear-gradient(145deg, rgba(35, 39, 42, 0.9), rgba(27, 40, 56, 0.9));
            border-radius: 30px;
            padding: 50px;
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(
                90deg,
                var(--xbox-green),
                var(--playstation-blue),
                var(--discord-blurple),
                var(--nintendo-red)
            );
        }

        .timer-title {
            text-align: center;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        .start-date {
            text-align: center;
            font-size: 14px;
            color: var(--gold-accent);
            margin-bottom: 30px;
            font-family: 'Orbitron', monospace;
        }

        /* Timer display */
        .timer-display {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .timer-display {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .time-unit {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, border-color 0.3s;
        }

        .time-unit:hover {
            transform: translateY(-5px);
            border-color: var(--gold-accent);
        }

        .time-value {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 5px;
        }

        .time-unit:nth-child(1) .time-value { color: var(--xbox-green); }
        .time-unit:nth-child(2) .time-value { color: var(--playstation-blue); }
        .time-unit:nth-child(3) .time-value { color: var(--discord-blurple); }
        .time-unit:nth-child(4) .time-value { color: var(--nintendo-red); }
        .time-unit:nth-child(5) .time-value { color: var(--steam-blue); }
        .time-unit:nth-child(6) .time-value { color: var(--gold-accent); }

        .time-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Secondary timer row */
        .timer-secondary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* Total stats */
        .total-stats {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            color: var(--steam-blue);
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .footer span {
            color: var(--nintendo-red);
        }

        /* Glow effects */
        .glow-xbox { text-shadow: 0 0 20px var(--xbox-green); }
        .glow-playstation { text-shadow: 0 0 20px var(--playstation-blue); }
        .glow-steam { text-shadow: 0 0 20px var(--steam-blue); }
        .glow-nintendo { text-shadow: 0 0 20px var(--nintendo-red); }
        .glow-discord { text-shadow: 0 0 20px var(--discord-blurple); }

        /* Pulse animation for seconds */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 1s ease-in-out infinite;
        }

        /* Achievement badge */
        .achievement {
            position: absolute;
            top: -15px;
            right: 30px;
            background: linear-gradient(135deg, var(--gold-accent), #FFA500);
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>
    <!-- Animated particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Platform icons -->
        <div class="platform-bar">
            <div class="platform-icon platform-xbox" title="Xbox">X</div>
            <div class="platform-icon platform-playstation" title="PlayStation">PS</div>
            <div class="platform-icon platform-steam" title="Steam">ST</div>
            <div class="platform-icon platform-nintendo" title="Nintendo">N</div>
            <div class="platform-icon platform-discord" title="Discord">DC</div>
        </div>

        <!-- Gamertag -->
        <div class="gamertag-container">
            <div class="gamertag-label">Legendary Gamertag</div>
            <h1 class="gamertag">biggoldencox</h1>
        </div>

        <!-- Timer card -->
        <div class="timer-card">
            <div class="achievement">OG Gamer</div>

            <div class="timer-title">Gaming Legacy Duration</div>
            <div class="start-date">Since December 25, 2009</div>

            <div class="timer-display">
                <div class="time-unit">
                    <div class="time-value" id="years">00</div>
                    <div class="time-label">Years</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="months">00</div>
                    <div class="time-label">Months</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="days">00</div>
                    <div class="time-label">Days</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours">00</div>
                    <div class="time-label">Hours</div>
                </div>
            </div>

            <div class="timer-secondary">
                <div class="time-unit">
                    <div class="time-value" id="minutes">00</div>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-unit">
                    <div class="time-value pulse" id="seconds">00</div>
                    <div class="time-label">Seconds</div>
                </div>
            </div>

            <div class="total-stats">
                <div class="stat-row">
                    <span class="stat-label">Total Days</span>
                    <span class="stat-value" id="totalDays">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Total Hours</span>
                    <span class="stat-value" id="totalHours">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Total Minutes</span>
                    <span class="stat-value" id="totalMinutes">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Total Seconds</span>
                    <span class="stat-value" id="totalSeconds">0</span>
                </div>
            </div>
        </div>

        <div class="footer">
            Gaming across all platforms <span>&hearts;</span> since Christmas 2009
        </div>
    </div>

    <script>
        // Start date: December 25, 2009
        const startDate = new Date('2009-12-25T00:00:00');

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            // Calculate time components
            const totalSeconds = Math.floor(diff / 1000);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            const totalDays = Math.floor(totalHours / 24);

            // Calculate years, months, days
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();
            let hours = now.getHours() - startDate.getHours();
            let minutes = now.getMinutes() - startDate.getMinutes();
            let seconds = now.getSeconds() - startDate.getSeconds();

            // Adjust for negative values
            if (seconds < 0) {
                seconds += 60;
                minutes--;
            }
            if (minutes < 0) {
                minutes += 60;
                hours--;
            }
            if (hours < 0) {
                hours += 24;
                days--;
            }
            if (days < 0) {
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += prevMonth.getDate();
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            // Update display
            document.getElementById('years').textContent = String(years).padStart(2, '0');
            document.getElementById('months').textContent = String(months).padStart(2, '0');
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            // Update total stats
            document.getElementById('totalDays').textContent = totalDays.toLocaleString();
            document.getElementById('totalHours').textContent = totalHours.toLocaleString();
            document.getElementById('totalMinutes').textContent = totalMinutes.toLocaleString();
            document.getElementById('totalSeconds').textContent = totalSeconds.toLocaleString();
        }

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const shapes = ['triangle', 'circle', 'square', 'x', 'xbox', 'discord'];

            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const shapeType = shapes[Math.floor(Math.random() * shapes.length)];

                if (shapeType === 'triangle') {
                    particle.classList.add('shape-triangle');
                } else if (shapeType === 'circle') {
                    particle.classList.add('shape-circle');
                } else if (shapeType === 'square') {
                    particle.classList.add('shape-square');
                } else if (shapeType === 'x') {
                    particle.classList.add('shape-x');
                    particle.textContent = 'X';
                } else if (shapeType === 'xbox') {
                    particle.classList.add('shape-xbox');
                    particle.textContent = 'X';
                } else if (shapeType === 'discord') {
                    particle.classList.add('shape-discord');
                }

                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (15 + Math.random() * 20) + 's';
                particle.style.animationDelay = Math.random() * 15 + 's';

                particlesContainer.appendChild(particle);
            }
        }

        // Initialize
        createParticles();
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
